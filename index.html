<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Cuerna Garage</title>
  
  <!-- Enlaces oficiales de React corregidos para que no se quede la pantalla en negro -->
  <script src="https://unpkg.com" crossorigin></script>
  <script src="https://unpkg.com" crossorigin></script>
  <script src="https://unpkg.com" crossorigin></script>
  <link href="https://googleapis.com" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
    body { background-color: #000000; color: #ffffff; font-family: 'Montserrat', sans-serif; padding: 20px; }
    .oro-text { color: #d4af37; }
    .glass-card { background: #11131c; border: 1px solid #232736; border-radius: 18px; padding: 20px; margin-bottom: 20px; }
    .btn-primary { background: #d4af37; color: #000000; border: none; padding: 14px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; text-transform: uppercase; }
    select, input { background: #000000; border: 1px solid #232736; color: #ffffff; padding: 14px; border-radius: 8px; width: 100%; margin-bottom: 12px; font-size: 16px; }
    .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin: 20px 0; }
    .auto-card { background: #161925; border-radius: 12px; overflow: hidden; border: 1px solid #232736; }
    .auto-img { width: 100%; height: 200px; object-fit: cover; background: #232736; }
    .auto-info { padding: 16px; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const INITIAL_STOCK = [
      { id: "1", nombre: "Honda Civic 2020", precio: "$285,000", categoria: "Sedán", kilometros: "45,000 km", transmision: "Automática", motor: "2.0L", descripcion: "Único dueño, factura original.", imagen: "https://unsplash.com" },
      { id: "2", nombre: "Toyota RAV4 2021", precio: "$420,000", categoria: "SUV", kilometros: "32,000 km", transmision: "Automática", motor: "2.5L", descripcion: "SUV familiar, servicios al corriente.", imagen: "https://unsplash.com" },
      { id: "3", nombre: "Chevrolet Silverado 2020", precio: "$520,000", categoria: "Pickup", kilometros: "40,000 km", transmision: "Automática", motor: "5.3L V8", descripcion: "Pickup 4x4 para trabajo pesado.", imagen: "https://unsplash.com" }
    ];

    function App() {
      const [filtroCat, setFiltroCat] = useState("Todos");
      const [maxPrecio, setMaxPrecio] = useState(600000);

      const dispararWhatsApp = (nombre, precio) => {
        const texto = `Hola, me interesa el ${nombre} con precio de ${precio} visto en Cuerna Garage.`;
        window.open(`https://wa.me{encodeURIComponent(texto)}`, '_blank');
      };

      const autosFiltrados = INITIAL_STOCK.filter(item => {
        const cash = Number(item.precio.replace(/[^0-9]/g, '')) || 0;
        return (filtroCat === "Todos" || item.categoria === filtroCat) && cash <= maxPrecio;
      });

      return (
        <div>
          <header style={{ textAlign: 'center', margin: '16px 0 24px' }}>
            <h1 className="oro-text" style={{ fontSize: '28px', fontWeight: 800 }}>CUERNA GARAGE</h1>
            <p style={{ color: '#8a90a6', fontSize: '14px', marginTop: '4px' }}>Catálogo Digital Móvil</p>
          </header>

          <section className="glass-card">
            <h3 className="oro-text" style={{ marginBottom: '12px' }}>🔍 Filtros de Búsqueda</h3>
            <select value={filtroCat} onChange={(e) => setFiltroCat(e.target.value)}>
              <option value="Todos">Todas las Categorías</option>
              <option value="Sedán">Sedán</option>
              <option value="SUV">SUV</option>
              <option value="Pickup">Pickup</option>
            </select>
            
            <label style={{ fontSize: '12px', color: '#8a90a6', display: 'block', marginBottom: '4px' }}>Precio Máximo: ${maxPrecio.toLocaleString('es-MX')}</label>
            <input type="range" min="200000" max="800000" step="10000" value={maxPrecio} onChange={(e) => setMaxPrecio(Number(e.target.value))} />
          </section>

          <main className="inventory-grid">
            {autosFiltrados.map(item => (
              <div key={item.id} className="auto-card">
                <img src={item.imagen} alt={item.nombre} className="auto-img" />
                <div className="auto-info">
                  <h4 style={{ fontSize: '18px', marginBottom: '4px' }}>{item.nombre}</h4>
                  <p className="oro-text" style={{ fontSize: '20px', fontWeight: 700, marginBottom: '8px' }}>{item.precio}</p>
                  <p style={{ fontSize: '13px', color: '#8a90a6', marginBottom: '16px' }}>{item.descripcion}</p>
                  <button className="btn-primary" onClick={() => dispararWhatsApp(item.nombre, item.precio)}>
                    💬 Cotizar por WhatsApp
                  </button>
                </div>
              </div>
            ))}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
