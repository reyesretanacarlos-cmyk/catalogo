<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Cuerna Garage - Catálogo Digital</title>
<script src="https://cloudflare.com" crossorigin="anonymous"></script>
<script src="https://cloudflare.com" crossorigin="anonymous"></script>
<script src="https://cloudflare.com" crossorigin="anonymous"></script>
<link href="https://googleapis.com" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation}
body{background:#000000;color:#fff;font-family:'Montserrat',sans-serif;padding:16px;padding-bottom:40px}
.oro-text{color:#d4af37}
.btn-primary{background:#d4af37;color:#000;border:none;padding:14px 24px;border-radius:8px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;justify-content:center;width:100%;font-size:16px}
.glass-card{background:#11131c;border:1px solid #232736;border-radius:18px;padding:20px;margin-bottom:20px}
input,select,textarea{background:#000;border:1px solid #232736;color:#fff;padding:14px;border-radius:8px;width:100%;margin-bottom:12px;font-size:16px;font-family:'Montserrat',sans-serif}
.inventory-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin:20px 0}
.auto-card{background:#161925;border-radius:12px;overflow:hidden;border:1px solid #232736}
.auto-img{width:100%;height:200px;object-fit:cover;background:#232736}
.auto-info{padding:16px}
.faq-item{border-bottom:1px solid #232736;padding:12px 0;cursor:pointer}
.faq-answer{padding-top:8px;color:#a0a5b5;font-size:14px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const WHATSAPP_NUM = "5217774539174";
const INITIAL_STOCK = [
  { id: "1", nombre: "Honda Civic 2020", precio: "$285,000", categoria: "Sedán", kilometros: "45,000 km", transmision: "Automática", motor: "2.0L", descripcion: "Único dueño, factura original.", imagen: "https://unsplash.com" },
  { id: "2", nombre: "Toyota RAV4 2021", precio: "$420,000", categoria: "SUV", kilometros: "32,000 km", transmision: "Automática", motor: "2.5L", descripcion: "SUV familiar, servicios al corriente.", imagen: "https://unsplash.com" },
  { id: "3", nombre: "Chevrolet Silverado 2020", precio: "$520,000", categoria: "Pickup", kilometros: "40,000 km", transmision: "Automática", motor: "5.3L V8", descripcion: "Pickup 4x4 para trabajo pesado.", imagen: "https://unsplash.com" }
];
const GESTORIA_DATA = [
  { n: "1", t: "Placas Morelos", d: "Alta y baja de placas definitivas ante el padrón vehicular de Morelos." },
  { n: "2", t: "Traspaso de Propiedad", d: "Cambio de propietario oficial con validación legal de contratos." },
  { n: "3", t: "Saneamiento Fiscal", d: "Liquidación y corrección de multas, recargos o tenencias atrasadas." }
];
const FAQS_DATA = [
  { q: "¿Cuál es el enganche mínimo?", a: "El enganche mínimo es del 20%. Trabajamos con Hey Banco de Banregio." },
  { q: "¿Qué incluye el financiamiento?", a: "Seguro de vida, de desempleo y cobertura del auto incluidos de forma integral." }
];

function App() {
  const [filtroCat, setFiltroCat] = useState("Todos");
  const [maxPrecio, setMaxPrecio] = useState(600000);
  const [faqOpen, setFaqOpen] = useState({});
  const [inventory] = useState(() => {
    const local = localStorage.getItem("cuerna_inventory_clean_v3");
    return local ? JSON.parse(local) : INITIAL_STOCK;
  });

  const dispararWhatsApp = (nombre, precio) => {
    const texto = `Hola, me interesa el ${nombre} con precio de ${precio} visto en Cuerna Garage.`;
    window.open(`https://wa.me{WHATSAPP_NUM}?text=${encodeURIComponent(texto)}`, '_blank');
  };

  const toggleFaq = (index) => {
    setFaqOpen(prev => ({ ...prev, [index]: !prev[index] }));
  };

  const autosFiltrados = inventory.filter(item => {
    const cash = Number(item.precio.replace(/[^0-9]/g, '')) || 0;
    return (filtroCat === "Todos" || item.categoria === filtroCat) && cash <= maxPrecio;
  });

  return (
    <div>
      <header style={{ textAlign: 'center', margin: '16px 0 24px' }}>
        <img src="logo.png" alt="Cuerna Garage" style={{ width: '80px', height: '80px', objectFit: 'contain', marginBottom: '10px', borderRadius: '50%' }} onError={(e)=>{e.target.style.display='none'}} />
        <h1 className="oro-text" style={{ fontSize: '28px', fontWeight: 800 }}>CUERNA GARAGE</h1>
        <p style={{ color: '#8a90a6', fontSize: '14px', marginTop: '4px' }}>Catálogo Digital Exclusivo</p>
      </header>

      <section className="glass-card">
        <h3 className="oro-text" style={{ marginBottom: '12px' }}>🔍 Filtros de Búsqueda</h3>
        <label style={{ fontSize: '12px', color: '#8a90a6', display: 'block', marginBottom: '4px' }}>Categoría:</label>
        <select value={filtroCat} onChange={(e) => setFiltroCat(e.target.value)}>
          <option value="Todos">Todas las Categorías</option>
          <option value="Sedán">Sedán</option>
          <option value="SUV">SUV</option>
          <option value="Pickup">Pickup</option>
        </select>
        
        <label style={{ fontSize: '12px', color: '#8a90a6', display: 'block', marginBottom: '4px' }}>Precio Máximo: ${maxPrecio.toLocaleString('es-MX')}</label>
        <input type="range" min="200000" max="800000" step="10000" value={maxPrecio} onChange={(e) => setMaxPrecio(Number(e.target.value))} style={{ margin: '8px 0 16px' }} />
      </section>

      <main className="inventory-grid">
        {autosFiltrados.map(item => (
          <div key={item.id} className="auto-card">
            <img src={item.imagen} alt={item.nombre} className="auto-img" />
            <div className="auto-info">
              <h4 style={{ fontSize: '18px', marginBottom: '4px' }}>{item.nombre}</h4>
              <p className="oro-text" style={{ fontSize: '20px', fontWeight: 700, marginBottom: '8px' }}>{item.precio}</p>
              <div style={{ fontSize: '12px', color: '#a0a5b5', marginBottom: '12px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '4px' }}>
                <div>📍 {item.kilometros}</div>
                <div>⚙️ {item.transmision}</div>
                <div>🔋 Motor: {item.motor}</div>
                <div>📦 {item.categoria}</div>
              </div>
              <p style={{ fontSize: '13px', color: '#8a90a6', marginBottom: '16px' }}>{item.descripcion}</p>
              <button className="btn-primary" onClick={() => dispararWhatsApp(item.nombre, item.precio)}>
                💬 Cotizar por WhatsApp
              </button>
            </div>
          </div>
        ))}
      </main>

      <section className="glass-card">
        <h3 className="oro-text" style={{ marginBottom: '12px' }}>🛠️ Servicios de Gestoría</h3>
        {GESTORIA_DATA.map(g => (
          <div key={g.n} style={{ marginBottom: '12px', paddingBottom: '12px', borderBottom: '1px solid #232736' }}>
            <h4 style={{ fontSize: '15px', color: '#fff' }}>{g.n}. {g.t}</h4>
            <p style={{ fontSize: '13px', color: '#8a90a6', marginTop: '2px' }}>{g.d}</p>
          </div>
        ))}
      </section>

      <section className="glass-card">
        <h3 className="oro-text" style={{ marginBottom: '12px' }}>❓ Preguntas Frecuentes</h3>
        {FAQS_DATA.map((faq, idx) => (
          <div key={idx} className="faq-item" onClick={() => toggleFaq(idx)}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontWeight: 700, fontSize: '14px' }}>
              <span>{faq.q}</span>
              <span>{faqOpen[idx] ? '▲' : '▼'}</span>
            </div>
            {faqOpen[idx] && <div className="faq-answer">{faq.a}</div>}
          </div>
        ))}
      </section>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
